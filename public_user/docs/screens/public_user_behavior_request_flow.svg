<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1300" viewBox="0 0 1600 1300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f7f4ec"/>
      <stop offset="100%" stop-color="#edf4fb"/>
    </linearGradient>
    <linearGradient id="hero" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#193c63"/>
      <stop offset="100%" stop-color="#2b6a79"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#233142" flood-opacity="0.18"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5d6876"/>
    </marker>
    <style>
      .title { font: 700 38px 'Helvetica Neue', Arial, sans-serif; fill: #ffffff; }
      .subtitle { font: 400 20px 'Helvetica Neue', Arial, sans-serif; fill: #dbe7ef; }
      .section { font: 700 30px 'Helvetica Neue', Arial, sans-serif; fill: #243447; }
      .boxTitle { font: 700 22px 'Helvetica Neue', Arial, sans-serif; fill: #17212b; }
      .boxText { font: 400 17px 'Helvetica Neue', Arial, sans-serif; fill: #334155; }
      .small { font: 400 15px 'Helvetica Neue', Arial, sans-serif; fill: #526274; }
      .pill { font: 700 18px 'Helvetica Neue', Arial, sans-serif; fill: #475569; }
      .line { stroke: #5d6876; stroke-width: 4; fill: none; marker-end: url(#arrow); }
      .softline { stroke: #90a0af; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-dasharray: 10 10; }
    </style>
  </defs>

  <rect width="1600" height="1300" fill="url(#bg)"/>

  <rect x="60" y="40" width="1480" height="150" rx="28" fill="url(#hero)" filter="url(#shadow)"/>
  <text x="100" y="105" class="title">public_user Behavior Architecture</text>
  <text x="100" y="150" class="title">Request Flow, Policy Checks, and Data Truth</text>
  <text x="100" y="182" class="subtitle">A practical system screen showing how user behavior moves through pages, shared rules, AJAX endpoints, and source-of-truth tables.</text>

  <text x="70" y="265" class="section">1. Main User Surfaces</text>
  <rect x="70" y="290" width="1460" height="190" rx="24" fill="#fff9f0" stroke="#ddb66d" stroke-width="2" filter="url(#shadow)"/>

  <rect x="105" y="340" width="205" height="90" rx="20" fill="#fdf4e3" stroke="#d6b175"/>
  <text x="160" y="392" class="pill">Login / Session</text>
  <text x="138" y="418" class="small">index.php, register.php</text>

  <rect x="340" y="340" width="205" height="90" rx="20" fill="#ebf4ff" stroke="#8db1da"/>
  <text x="410" y="392" class="pill">Feed</text>
  <text x="380" y="418" class="small">feed.php, feed_api.php</text>

  <rect x="575" y="340" width="205" height="90" rx="20" fill="#effbf0" stroke="#93be9a"/>
  <text x="635" y="392" class="pill">Profiles</text>
  <text x="610" y="418" class="small">profile.php, public.php</text>

  <rect x="810" y="340" width="205" height="90" rx="20" fill="#f5f0ff" stroke="#af99d8"/>
  <text x="860" y="392" class="pill">Messages</text>
  <text x="840" y="418" class="small">messages.php, chat.php</text>

  <rect x="1045" y="340" width="205" height="90" rx="20" fill="#eefbf8" stroke="#8bc0b4"/>
  <text x="1096" y="392" class="pill">Live Video</text>
  <text x="1065" y="418" class="small">public_live.php, live_watch.php</text>

  <rect x="1280" y="340" width="205" height="90" rx="20" fill="#fff3f3" stroke="#d4a0a0"/>
  <text x="1318" y="392" class="pill">Security / Devices</text>
  <text x="1310" y="418" class="small">manage_devices.php, security_tools.php</text>

  <line x1="800" y1="480" x2="800" y2="545" class="line"/>

  <text x="70" y="595" class="section">2. Request Path Through Shared Backend Rules</text>
  <rect x="70" y="620" width="1460" height="250" rx="24" fill="#ffffff" stroke="#c8d2de" stroke-width="2" filter="url(#shadow)"/>

  <rect x="110" y="700" width="175" height="88" rx="20" fill="#e9f2ff" stroke="#8db1da"/>
  <text x="151" y="752" class="pill">Browser Action</text>

  <rect x="335" y="700" width="175" height="88" rx="20" fill="#edf9ef" stroke="#93be9a"/>
  <text x="370" y="752" class="pill">Page / AJAX</text>

  <rect x="560" y="700" width="205" height="88" rx="20" fill="#fff4e9" stroke="#d8af78"/>
  <text x="598" y="742" class="pill">Session and Identity</text>
  <text x="603" y="770" class="small">session_user.php</text>

  <rect x="815" y="700" width="205" height="88" rx="20" fill="#f5f0ff" stroke="#af99d8"/>
  <text x="852" y="742" class="pill">Policy and Access</text>
  <text x="842" y="770" class="small">friend_system.php, page rules</text>

  <rect x="1070" y="700" width="180" height="88" rx="20" fill="#eefbf8" stroke="#8bc0b4"/>
  <text x="1104" y="752" class="pill">Database Truth</text>

  <rect x="1300" y="700" width="160" height="88" rx="20" fill="#f3fbf4" stroke="#96c28b"/>
  <text x="1334" y="752" class="pill">UI Response</text>

  <line x1="285" y1="744" x2="335" y2="744" class="line"/>
  <line x1="510" y1="744" x2="560" y2="744" class="line"/>
  <line x1="765" y1="744" x2="815" y2="744" class="line"/>
  <line x1="1020" y1="744" x2="1070" y2="744" class="line"/>
  <line x1="1250" y1="744" x2="1300" y2="744" class="line"/>

  <text x="115" y="830" class="small">Every protected request should pass auth first, then policy checks, then source-of-truth reads or writes.</text>

  <line x1="800" y1="870" x2="800" y2="935" class="line"/>

  <text x="70" y="985" class="section">3. Core Behavior Domains</text>

  <rect x="70" y="1010" width="330" height="210" rx="24" fill="#f4fbff" stroke="#86add0" stroke-width="2" filter="url(#shadow)"/>
  <text x="100" y="1055" class="boxTitle">Identity and Session</text>
  <text x="100" y="1090" class="boxText">• users</text>
  <text x="100" y="1123" class="boxText">• user_sessions</text>
  <text x="100" y="1156" class="boxText">• user_profile_settings</text>
  <text x="100" y="1193" class="small">Controls who the user is, whether the session is valid, and how the account behaves.</text>

  <rect x="435" y="1010" width="330" height="210" rx="24" fill="#f5fff7" stroke="#7cb789" stroke-width="2" filter="url(#shadow)"/>
  <text x="465" y="1055" class="boxTitle">Social and Visibility</text>
  <text x="465" y="1090" class="boxText">• user_contacts</text>
  <text x="465" y="1123" class="boxText">• contact_requests</text>
  <text x="465" y="1156" class="boxText">• public_follows, profile access</text>
  <text x="465" y="1193" class="small">Controls who can see profiles, friend-scoped posts, and friends-only live sessions.</text>

  <rect x="800" y="1010" width="330" height="210" rx="24" fill="#fcfff9" stroke="#b4c57d" stroke-width="2" filter="url(#shadow)"/>
  <text x="830" y="1055" class="boxTitle">Feed and Content</text>
  <text x="830" y="1090" class="boxText">• public_posts</text>
  <text x="830" y="1123" class="boxText">• attachments, comments, reactions</text>
  <text x="830" y="1156" class="boxText">• saves, shares, reads, views</text>
  <text x="830" y="1193" class="small">Controls the main posting experience and feed-derived counters.</text>

  <rect x="1165" y="1010" width="365" height="210" rx="24" fill="#fff8fb" stroke="#d4a3be" stroke-width="2" filter="url(#shadow)"/>
  <text x="1195" y="1055" class="boxTitle">Messaging and Live</text>
  <text x="1195" y="1090" class="boxText">• chats, groups, typing, unread state</text>
  <text x="1195" y="1123" class="boxText">• user_video_lives and child tables</text>
  <text x="1195" y="1156" class="boxText">• video call and signaling rows</text>
  <text x="1195" y="1193" class="small">Controls realtime communication, live presence, room reactions, and calls.</text>

  <path d="M 400 1115 C 415 1115, 420 1115, 435 1115" class="softline"/>
  <path d="M 765 1115 C 780 1115, 785 1115, 800 1115" class="softline"/>
  <path d="M 1130 1115 C 1145 1115, 1150 1115, 1165 1115" class="softline"/>
</svg>
